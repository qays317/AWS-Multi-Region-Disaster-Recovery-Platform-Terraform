name: DR Readiness Check (Manual)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  dr-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      # AWS authentication (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::127214183643:role/github-actions-terraform-role
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DR tool
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/QaysAlnajjad/dr-tool.git

      - name: Run DR checker
        run: |
          dr-checker \
            --config dr-checker-config.yaml 
